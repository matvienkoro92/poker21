<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Превью — iPhone Pro Max</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      color: #999;
    }
    .preview-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      z-index: 2;
    }
    .phone-wrap {
      position: relative;
      width: 430px;
      height: 932px;
      max-width: 100%;
      max-height: calc(100vh - 48px);
      border-radius: 44px;
      padding: 12px;
      background: #000;
      box-shadow: 0 0 0 3px #333, 0 24px 48px rgba(0,0,0,0.5);
    }
    .phone-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 32px;
      background: #0f172a;
    }
    @media (max-width: 460px) {
      .phone-wrap { width: 100%; height: 90vh; }
      body { padding: 12px; }
    }
  </style>
</head>
<body>
  <span class="preview-label">iPhone 16/17 Pro Max (430×932)</span>
  <div class="phone-wrap">
    <iframe src="index.html" title="Клуб Два туза"></iframe>
  </div>
</body>
</html>
